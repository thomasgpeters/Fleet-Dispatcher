# Fleet Dispatcher — local development database.
#
#   docker compose up -d db    # PostgreSQL with schema + seed applied
#
# The middleware (ApiLogicServer) is generated and run outside this repo;
# see docs/MIDDLEWARE_SETUP.md. Point it at this database via DATABASE_URL.

services:
  db:
    # For PostGIS support, switch to: postgis/postgis:16-3.4
    # then apply database/gis_bootstrap.sql (see docs/DEPLOYMENT.md).
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-fleet_dispatcher}
      POSTGRES_USER: ${DB_USER:-fleet}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fleet}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - fleet_pgdata:/var/lib/postgresql/data
      # Schema + seed are applied automatically on first init.
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/02-seed_data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fleet} -d ${DB_NAME:-fleet_dispatcher}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  fleet_pgdata:

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 860" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="aBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1f4e79"/>
    </marker>
    <marker id="aOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#cf6f2c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1180" height="860" fill="#f4f7fb"/>
  <text x="40" y="48" font-size="26" font-weight="700" fill="#18222e">Fleet Dispatcher — Architecture</text>
  <text x="40" y="74" font-size="14" fill="#5b6b7b">Schema-driven · ApiLogicServer JSON:API · Kafka realtime stream · multiple clients</text>

  <!-- legend -->
  <g font-size="12" fill="#5b6b7b">
    <rect x="828" y="28" width="314" height="64" rx="8" fill="#ffffff" stroke="#d8e1ec"/>
    <line x1="846" y1="50" x2="892" y2="50" stroke="#1f4e79" stroke-width="2.5" marker-end="url(#aBlue)"/>
    <text x="900" y="54">Request / response — ALS JSON:API</text>
    <line x1="846" y1="76" x2="892" y2="76" stroke="#cf6f2c" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#aOrange)"/>
    <text x="900" y="80">Realtime stream — Kafka → WebSocket</text>
  </g>

  <!-- Mobile -->
  <rect x="60" y="110" width="250" height="96" rx="10" fill="#ffffff" stroke="#2c6fb3" stroke-width="2"/>
  <text x="78" y="140" font-size="16" font-weight="700" fill="#1f4e79">Mobile app</text>
  <text x="78" y="162" font-size="12" fill="#5b6b7b">Ionic + React + TypeScript</text>
  <text x="78" y="180" font-size="12" fill="#5b6b7b">driver &amp; dispatcher · login · trips</text>
  <text x="78" y="198" font-size="12" fill="#e8833a">:5173 (web build)</text>

  <!-- Desktop -->
  <rect x="860" y="110" width="260" height="110" rx="10" fill="#ffffff" stroke="#2c6fb3" stroke-width="2"/>
  <text x="878" y="140" font-size="16" font-weight="700" fill="#1f4e79">Dispatcher Desktop</text>
  <text x="878" y="162" font-size="12" fill="#5b6b7b">C++ / Wt — console + HUD</text>
  <text x="878" y="180" font-size="12" fill="#5b6b7b">board · comms rail · live map</text>
  <text x="878" y="206" font-size="12" fill="#e8833a">:8089  ( / and /hud )</text>

  <!-- ApiLogicServer -->
  <rect x="300" y="300" width="320" height="116" rx="10" fill="#eef3f9" stroke="#1f4e79" stroke-width="2"/>
  <text x="320" y="332" font-size="17" font-weight="700" fill="#1f4e79">ApiLogicServer (ALS)</text>
  <text x="320" y="356" font-size="12" fill="#5b6b7b">JSON:API + JWT auth (SAFRS / LogicBank)</text>
  <text x="320" y="374" font-size="12" fill="#5b6b7b">reflects the fleet schema · add-auth → app_user</text>
  <text x="320" y="392" font-size="12" fill="#5b6b7b">als-extensions: Kafka event producers</text>
  <text x="320" y="410" font-size="12" fill="#e8833a">:5659</text>

  <!-- Realtime bridge -->
  <rect x="840" y="300" width="280" height="116" rx="10" fill="#eef3f9" stroke="#1f4e79" stroke-width="2"/>
  <text x="860" y="332" font-size="17" font-weight="700" fill="#1f4e79">Realtime bridge</text>
  <text x="860" y="356" font-size="12" fill="#5b6b7b">Kafka consumer → WebSocket</text>
  <text x="860" y="374" font-size="12" fill="#5b6b7b">JWT-authed · pub/sub fan-out</text>
  <text x="860" y="392" font-size="12" fill="#5b6b7b">topic routing + correlation ids</text>
  <text x="860" y="410" font-size="12" fill="#e8833a">:8765 (ws)</text>

  <!-- Kafka -->
  <rect x="300" y="500" width="540" height="96" rx="10" fill="#fdf1e6" stroke="#cf6f2c" stroke-width="2"/>
  <text x="320" y="532" font-size="17" font-weight="700" fill="#b4611f">Apache Kafka</text>
  <text x="320" y="556" font-size="12" fill="#7a5a3a">durable event log · ALS produces, services consume</text>
  <text x="320" y="576" font-size="12" fill="#7a5a3a">topics: message · position · load · trip · waypoint · alert</text>
  <text x="790" y="532" font-size="12" fill="#e8833a">:9092</text>

  <!-- Geospatial -->
  <rect x="60" y="660" width="320" height="120" rx="10" fill="#ffffff" stroke="#2c6fb3" stroke-width="2"/>
  <text x="78" y="690" font-size="16" font-weight="700" fill="#1f4e79">Geospatial service</text>
  <text x="78" y="712" font-size="12" fill="#5b6b7b">PostGIS nearest-POI / spatial queries</text>
  <text x="78" y="730" font-size="12" fill="#5b6b7b">auto route recompute (waypoint/trip)</text>
  <text x="78" y="748" font-size="12" fill="#5b6b7b">nearest-neighbor optimizer (HERE pluggable)</text>
  <text x="78" y="768" font-size="12" fill="#e8833a">:5701</text>

  <!-- Assistant -->
  <rect x="860" y="660" width="260" height="110" rx="10" fill="#ffffff" stroke="#2c6fb3" stroke-width="2"/>
  <text x="878" y="690" font-size="16" font-weight="700" fill="#1f4e79">Hey Dispatch assistant</text>
  <text x="878" y="712" font-size="12" fill="#5b6b7b">voice — LLM tool-use</text>
  <text x="878" y="730" font-size="12" fill="#5b6b7b">mobile mic → assistant → ALS</text>
  <text x="878" y="756" font-size="12" fill="#e8833a">:5710</text>

  <!-- PostgreSQL -->
  <rect x="450" y="660" width="300" height="120" rx="10" fill="#eef3f9" stroke="#1f4e79" stroke-width="2"/>
  <text x="470" y="690" font-size="16" font-weight="700" fill="#1f4e79">PostgreSQL 16</text>
  <text x="470" y="712" font-size="12" fill="#5b6b7b">source of truth — fleet schema (40 tables)</text>
  <text x="470" y="730" font-size="12" fill="#5b6b7b">gis schema · PostGIS (isolated from ALS)</text>
  <text x="470" y="748" font-size="12" fill="#5b6b7b">app_user (JWT) · loads · trips · messages</text>
  <text x="470" y="768" font-size="12" fill="#e8833a">:5432</text>

  <!-- flows: clients -> ALS -->
  <line x1="240" y1="206" x2="380" y2="300" stroke="#1f4e79" stroke-width="2.2" marker-end="url(#aBlue)"/>
  <text x="246" y="262" font-size="11" fill="#1f4e79">writes + snapshots</text>
  <line x1="905" y1="220" x2="600" y2="322" stroke="#1f4e79" stroke-width="2.2" marker-end="url(#aBlue)"/>
  <text x="700" y="258" font-size="11" fill="#1f4e79">JSON:API</text>

  <!-- ALS -> Postgres -->
  <line x1="360" y1="416" x2="520" y2="660" stroke="#1f4e79" stroke-width="2.2" marker-end="url(#aBlue)"/>
  <text x="372" y="544" font-size="11" fill="#1f4e79">SQLAlchemy</text>

  <!-- ALS -> Kafka -->
  <line x1="470" y1="416" x2="470" y2="500" stroke="#cf6f2c" stroke-width="2.4" stroke-dasharray="6 4" marker-end="url(#aOrange)"/>
  <text x="482" y="462" font-size="11" fill="#b4611f">events (after_flush)</text>

  <!-- Kafka -> bridge -->
  <line x1="820" y1="500" x2="950" y2="416" stroke="#cf6f2c" stroke-width="2.4" stroke-dasharray="6 4" marker-end="url(#aOrange)"/>
  <text x="836" y="472" font-size="11" fill="#b4611f">consume (pub/sub)</text>

  <!-- bridge -> desktop -->
  <line x1="980" y1="300" x2="980" y2="220" stroke="#cf6f2c" stroke-width="2.4" stroke-dasharray="6 4" marker-end="url(#aOrange)"/>
  <text x="992" y="266" font-size="11" fill="#b4611f">WS → CommBus</text>

  <!-- bridge -> mobile (long) -->
  <path d="M840,350 C560,350 470,250 312,178" fill="none" stroke="#cf6f2c" stroke-width="2.4" stroke-dasharray="6 4" marker-end="url(#aOrange)"/>
  <text x="430" y="330" font-size="11" fill="#b4611f">WebSocket (live: messages, positions)</text>

  <!-- Kafka -> geospatial -->
  <line x1="340" y1="596" x2="250" y2="660" stroke="#cf6f2c" stroke-width="2.4" stroke-dasharray="6 4" marker-end="url(#aOrange)"/>
  <text x="96" y="634" font-size="11" fill="#b4611f">waypoint/trip → recompute</text>

  <!-- geospatial -> postgres -->
  <line x1="380" y1="712" x2="450" y2="712" stroke="#1f4e79" stroke-width="2.2" marker-end="url(#aBlue)"/>
  <text x="372" y="704" font-size="11" fill="#1f4e79">gis · upsert route</text>

  <!-- assistant -> ALS -->
  <path d="M900,660 C720,560 640,470 600,416" fill="none" stroke="#1f4e79" stroke-width="2" marker-end="url(#aBlue)"/>
  <text x="706" y="556" font-size="11" fill="#1f4e79">tools (JSON:API)</text>

  <text x="40" y="828" font-size="12" fill="#5b6b7b">Two planes: realtime data (messages, fleet locations, map updates) streams via Kafka → bridge; everything else is ALS request/response. Clients never touch PostgreSQL or Kafka brokers directly.</text>
</svg>

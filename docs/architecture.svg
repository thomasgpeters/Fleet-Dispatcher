<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 820" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="arrowUp" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1060" height="820" fill="#f8fafc"/>

  <!-- Title -->
  <text x="530" y="38" text-anchor="middle" font-size="25" font-weight="700" fill="#0f172a">Fleet Dispatcher — System Architecture</text>
  <text x="530" y="60" text-anchor="middle" font-size="13" fill="#64748b">Three runtime tiers over one schema · two portals share one middleware and one backend</text>

  <!-- VCP deployment boundary -->
  <rect x="40" y="80" width="980" height="560" rx="16" fill="#fffbeb" stroke="#d97706" stroke-width="2" stroke-dasharray="9 6"/>
  <text x="60" y="106" font-size="14" font-weight="700" fill="#b45309">VCP-managed deployment</text>
  <text x="60" y="124" font-size="11.5" fill="#b45309">no-code · builds container images from C++ / TS source · runs on local Docker · Kind · vanilla k8s · Azure</text>

  <!-- ===== Client tier ===== -->
  <!-- Desktop -->
  <rect x="95" y="150" width="385" height="135" rx="12" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="287" y="180" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">Dispatcher Portal</text>
  <text x="287" y="204" text-anchor="middle" font-size="13.5" fill="#1e40af">Desktop client · C++ / Wt</text>
  <text x="287" y="226" text-anchor="middle" font-size="12" fill="#334155">Bootstrap theme + deployed Wt resources/</text>
  <text x="287" y="248" text-anchor="middle" font-size="12" fill="#334155">Weekly board · load intake · assignment</text>
  <text x="287" y="270" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">portals/dispatcher-desktop · role: Dispatcher</text>

  <!-- Mobile -->
  <rect x="580" y="150" width="385" height="135" rx="12" fill="#cffafe" stroke="#0e7490" stroke-width="2"/>
  <text x="772" y="180" text-anchor="middle" font-size="17" font-weight="700" fill="#155e75">Driver &amp; Updater Portal</text>
  <text x="772" y="204" text-anchor="middle" font-size="13.5" fill="#0e7490">Mobile client · React 18 / Ionic 8</text>
  <text x="772" y="226" text-anchor="middle" font-size="12" fill="#334155">Capacitor 6 · TypeScript 5.5 · Vite 5</text>
  <text x="772" y="248" text-anchor="middle" font-size="12" fill="#334155">Loads · schedule · post-trip · fuel/DEF log</text>
  <text x="772" y="270" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">repo: Fleet-Dispatcher-Mobile · roles: Driver, Updater</text>

  <!-- client -> middleware arrows -->
  <line x1="287" y1="285" x2="287" y2="352" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="772" y1="285" x2="772" y2="352" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="312" font-size="11.5" fill="#334155">JSON:API</text>
  <text x="300" y="328" font-size="11.5" fill="#334155">(SAFRS) · HTTP</text>
  <text x="785" y="312" font-size="11.5" fill="#334155">JSON:API</text>
  <text x="785" y="328" font-size="11.5" fill="#334155">(SAFRS) · HTTP</text>

  <!-- ===== Middleware tier (Python = ApiLogicServer) ===== -->
  <rect x="95" y="355" width="870" height="130" rx="12" fill="#dcfce7" stroke="#15803d" stroke-width="2.5"/>
  <text x="530" y="386" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">ApiLogicServer  —  the Python layer  (middleware / application tier)</text>
  <text x="530" y="412" text-anchor="middle" font-size="13.5" fill="#166534">JSON:API / SAFRS endpoints  ·  LogicBank business rules  ·  SQLAlchemy ORM  ·  admin app</text>
  <text x="530" y="436" text-anchor="middle" font-size="12.5" fill="#334155">Generated from the schema by  <tspan font-family="monospace" font-weight="700">ApiLogicServer create</tspan>  — no hand-written middleware code</text>
  <text x="530" y="460" text-anchor="middle" font-size="11.5" fill="#64748b" font-style="italic">enforces invariants: weekly load cap · driver_pay = rate × % · % &amp; cost-responsibility from driver_type</text>
  <rect x="876" y="365" width="78" height="26" rx="13" fill="#15803d"/>
  <text x="915" y="383" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">: 5656</text>

  <!-- middleware <-> backend arrows -->
  <line x1="470" y1="485" x2="470" y2="532" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="482" y="513" font-size="11.5" fill="#334155">SQLAlchemy (runtime reads/writes)</text>

  <line x1="430" y1="532" x2="430" y2="485" stroke="#64748b" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrowUp)"/>
  <text x="120" y="513" font-size="11.5" fill="#64748b" font-style="italic">reflects schema → models (create-time)</text>

  <!-- ===== Backend tier ===== -->
  <rect x="95" y="535" width="870" height="95" rx="12" fill="#e0e7ff" stroke="#4338ca" stroke-width="2"/>
  <text x="530" y="568" text-anchor="middle" font-size="17" font-weight="700" fill="#312e81">PostgreSQL  —  backend data store</text>
  <text x="530" y="592" text-anchor="middle" font-size="13" fill="#3730a3">Domain objects (UUID keys) + lookup tables (integer keys) · FK relationships drive the JSON:API</text>
  <text x="530" y="614" text-anchor="middle" font-size="12" fill="#334155" font-family="monospace" font-weight="700">database/schema.sql  +  database/seed_data.sql</text>
  <rect x="876" y="545" width="78" height="26" rx="13" fill="#4338ca"/>
  <text x="915" y="563" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">: 5432</text>

  <!-- ===== Design-time reference (outside the deployed boundary) ===== -->
  <rect x="120" y="690" width="500" height="100" rx="12" fill="#f1f5f9" stroke="#475569" stroke-width="1.8" stroke-dasharray="7 5"/>
  <text x="370" y="722" text-anchor="middle" font-size="14.5" font-weight="700" fill="#334155">Shared domain language  (design-time · not deployed)</text>
  <text x="370" y="744" text-anchor="middle" font-size="12" fill="#475569">docs/ — ubiquitous language · bounded contexts · invariants</text>
  <text x="370" y="766" text-anchor="middle" font-size="12" fill="#475569">a consistent vocabulary for us &amp; the spec; shapes the schema</text>
  <text x="370" y="785" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">ALS generates the running app from the schema — not from this</text>

  <!-- design-time -> schema -->
  <line x1="430" y1="690" x2="430" y2="632" stroke="#64748b" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrowUp)"/>
  <text x="442" y="668" font-size="11" fill="#64748b" font-style="italic">informs schema.sql</text>

  <!-- ===== Legend ===== -->
  <rect x="700" y="690" width="240" height="100" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="716" y="713" font-size="12.5" font-weight="700" fill="#0f172a">Legend</text>
  <line x1="716" y1="732" x2="752" y2="732" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="760" y="736" font-size="11.5" fill="#334155">runtime (HTTP / SQL)</text>
  <line x1="716" y1="756" x2="752" y2="756" stroke="#64748b" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrowUp)"/>
  <text x="760" y="760" font-size="11.5" fill="#334155">build-time / design input</text>
  <rect x="716" y="772" width="16" height="11" rx="3" fill="#fffbeb" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="760" y="782" font-size="11.5" fill="#334155">VCP deployment boundary</text>
</svg>
